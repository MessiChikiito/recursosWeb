<style>
        body {
            font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #ffffff;
            color: #06325a;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding: 0;
            margin: 0;
        }

        h1, h2, h3 {
            font-family: inherit;
            margin: 0;
            color: #0132AF;
        }

        h3.ue-h3 {
            font-size: 24px;
            font-weight: 900;
            color: #06325a;
            margin: 0 0 28px;
            letter-spacing: -0.5px;
        }

        * {
            box-sizing: border-box;
        }

        a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible {
            outline: none;
            box-shadow: 0 0 0 4px rgba(1, 50, 175, .08);
            border-color: rgba(1, 50, 175, .35);
        }

        .ue-why-benefits-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .ue-why-benefit-card {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #e0e3e8;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            padding: 24px;
            transition: all 0.3s ease !important;
            padding-top: 50px;
            position: relative;
        }

        .ue-why-benefit-card::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 24px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }

        .ue-why-benefit-card:nth-child(1)::before {
            background: linear-gradient(135deg, #0132AF 0%, #1a5bcf 100%);
            box-shadow: 0 6px 16px rgba(1, 50, 175, 0.35);
        }

        .ue-why-benefit-card:nth-child(2)::before {
            background: linear-gradient(135deg, #FF6A00 0%, #ff8a2e 100%);
            box-shadow: 0 6px 16px rgba(255, 106, 0, 0.35);
        }

        .ue-why-benefit-card:nth-child(3)::before {
            background: linear-gradient(135deg, #00897b 0%, #00a89d 100%);
            box-shadow: 0 6px 16px rgba(0, 137, 123, 0.35);
        }

        .ue-why-benefit-card:nth-child(4)::before {
            background: linear-gradient(135deg, #d946ef 0%, #ec4899 100%);
            box-shadow: 0 6px 16px rgba(217, 70, 239, 0.35);
        }

        .ue-why-benefit-card:hover {
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08) !important;
        }

        .ue-why-benefit-title {
            font-size: 16px;
            font-weight: 800;
            color: #06325a;
            margin: 0 0 6px;
        }

        .ue-why-benefit-desc {
            font-size: 14px;
            color: #7a8a99;
            margin: 0;
            font-weight: 600;
        }

        .ue-why-metrics {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 24px 0;
        }

        .ue-why-metric {
            background: linear-gradient(135deg, #f9fcff 0%, #f5fbff 100%);
            border: 1px solid rgba(1, 50, 175, 0.1);
            padding: 16px 20px;
            border-radius: 12px;
            font-weight: 900;
            color: #0132AF;
            flex: 1;
            min-width: 140px;
        }

        .ue-why-metric__sub {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #7a8a99;
            margin-top: 4px;
        }

        .ue-why-btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.4s cubic-bezier(.4,0,.2,1) !important;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #0132AF 0%, #1a5bcf 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(1, 50, 175, 0.3);
        }

        .ue-why-btn:hover {
            background: linear-gradient(135deg, #1a5bcf 0%, #2471e0 100%) !important;
            box-shadow: 0 8px 24px rgba(1, 50, 175, 0.5) !important;
            transform: translateY(-2px) !important;
        }

        .ue-why-btn:active {
            transform: translateY(0px) !important;
        }

        @media (max-width: 640px) {
            .ue-why-benefits-grid {
                grid-template-columns: 1fr;
            }
        }

</style>

  <div class="ue-card">
    <h3 class="ue-h3">¿Por qué elegirnos?</h3>
    
    <div class="ue-why-benefits-grid">
      <div class="ue-why-benefit-card">
        <div class="ue-why-benefit-title">Enfoque práctico</div>
        <div class="ue-why-benefit-desc">Proyectos reales y casos empresariales</div>
      </div>
      <div class="ue-why-benefit-card">
        <div class="ue-why-benefit-title">Docentes activos</div>
        <div class="ue-why-benefit-desc">Experiencia real en industria</div>
      </div>
      <div class="ue-why-benefit-card">
        <div class="ue-why-benefit-title">Soporte virtual</div>
        <div class="ue-why-benefit-desc">Acompañamiento en horarios hábiles</div>
      </div>
      <div class="ue-why-benefit-card">
        <div class="ue-why-benefit-title">Red de aliados</div>
        <div class="ue-why-benefit-desc">Convenios y oportunidades</div>
      </div>
    </div>

    <div class="ue-why-metrics">
      <div class="ue-why-metric">+ <span id="metricAllies">--</span><span class="ue-why-metric__sub">empresas aliadas</span></div>
      <div class="ue-why-metric"><span id="metricPractice">--</span><span class="ue-why-metric__sub">meses de práctica</span></div>
    </div>

    <div style="margin-top:12px">
      <a href="#convenios" class="ue-why-btn">Ver convenios</a>
    </div>

  </div>
