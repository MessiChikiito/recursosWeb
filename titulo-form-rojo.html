<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Título y Subtítulo</title>
    <style>

        .form-title {
            color: #ff0000;
            font-size: 28px;
            font-weight: 700;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            text-align: center;
        }

        .form-subtitle {
            color: #333;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            line-height: 1.5;
                        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        @media (max-width: 480px) {
            .form-title {
                font-size: 22px;
                font-weight: 800;
            }

            .form-subtitle {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="form-title">¿Deseas más información?</div>
    <div class="form-subtitle">Inscribete para recibir orientación personalizada sobre el programa:</div>
</body>
</html>
